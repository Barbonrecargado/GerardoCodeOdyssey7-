<!DOCTYPE html>
<meta charset="UTF-8">
<h3>Juego Secreto</h3>

<input/>
<button>Verificar si acertó el secreto</button>

<script>
    // var secreto = Math.floor(Math.random() * 100) + 1; // Genera un número aleatorio entre 1 y 100
    var secreto = Math.round(Math.random() * 10); // Genera un número aleatorio entre 0 y 10
    var input = document.querySelector("input");
    input.focus();

    function verificarSecreto() {

    if (parseInt(input.value) == secreto) {
        alert("¡Acertaste el secreto!");


    } else {
        alert("¡No acertaste el secreto! Intenta de nuevo.");
    }

    input.value = "";
    input.focus();

    }

    var button = document.querySelector("button");
    button.onclick = verificarSecreto;


</script>
