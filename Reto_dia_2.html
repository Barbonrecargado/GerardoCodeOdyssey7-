<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Adivinación - Gerardo</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <div class="container">
        <h3>Juego de Adivinación</h3>
        <p>¡Bienvenido! Adivina un número entre 1 y 10. Tienes 3 intentos.</p>
        <button onclick="startGame()">Comenzar Juego</button>
        <div id="resultado"></div>
    </div>

    <script>
        function imprimir(frase) {
            const resultadoDiv = document.getElementById("resultado");
            resultadoDiv.innerHTML += frase + "<br><br>";
        }

        function startGame() { 
            var numeroPensado = Math.floor(Math.random() * 10) + 1;
            var intentos = 3;
            var contador = 1;
            var gano = false;
            
            document.getElementById("resultado").innerHTML = ""; // Limpiar pantalla al empezar

            while(contador <= intentos) {
                var numeroLanzado = parseInt(prompt("Adivina el número entre 1 y 10 (Intento " + contador + " de " + intentos + "):"));
                
                if(numeroLanzado === numeroPensado) {
                    alert("¡Felicidades! Adivinaste en el intento " + contador);
                    imprimir("🎉 ¡Felicidades! El número era: " + numeroPensado);
                    gano = true;
                    break; 
                } else {
                    alert("¡Incorrecto!");
                }
                contador++;
            }

            if(!gano) {
                imprimir("❌ Lo siento, el número era: " + numeroPensado);
            }
            imprimir("¡Gracias por jugar!");
        }
    </script>
</body>
</html>
